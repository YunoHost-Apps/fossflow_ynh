#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "fossflow"
name = "FossFLOW"
description.en = "Isometric diagramming tool"
description.fr = "Outil pour réaliser des diagrammes isométriques"

version = "2026.04.12~ynh1"

maintainers = ["oleole39"]

[upstream]
license = "Unlicense"
userdoc = "https://github.com/stan-smith/FossFLOW?tab=readme-ov-file#how-to-use"
code = "https://github.com/stan-smith/FossFLOW"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "20M"
ram.build = "10M"
ram.runtime = "10M"

[install]
    [install.domain]
    type = "domain"

    #[install.path]
    #type = "path"
    #default = "/fossflow"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.enable_server_storage]
    ask.en = "Offer saving drawings on the server"
    ask.fr = "Permettre de sauvegarder les dessins sur le serveur"
    help.en = "If disabled, nothing leaves the user's browser"
    help.fr = "Si désactivé, rien ne quitte le navigateur de l'utilisateur"
    type = "boolean"
    default = 0
    yes="true"
    no="false"

[resources]

    [resources.sources]

        [resources.sources.main]
        # This is not used as we are using git clone. It's only here for autoupdate.
        url = "https://github.com/stan-smith/FossFLOW/archive/051c10df52de62377b7008e407c9ee33371700ea.tar.gz"
        sha256 = "efb6fdc8d11429af724c748183d6f10872636234006b6484d95115dd84db0057"
        prefetch = false
        autoupdate.strategy = "latest_github_commit"
        
        [resources.sources.ynh_build]
        url = "https://github.com/oleole39/fossflow_ynh/releases/download/v2026.04.02-5472c9b9/FossFLOW_v2026.04.02-5472c9b9_ynh.zip"
        sha256 = "14b3675a572657537dff81102b7e70f99f871df041bde4fe4ba8b1e640d26a80"
        format = "zip"
        extract = true
        in_subdir = true

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"
    
    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.data_dir]

	[resources.nodejs]
	version = "22"
